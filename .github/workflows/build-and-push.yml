name: Build and Push to Artifact Registry with Compose

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GAR_LOCATION: ${{ vars.GAR_LOCATION }}
  GAR_REPOSITORY: ${{ vars.GAR_REPOSITORY }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository with full history and tags
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token
          create_credentials_file: true
          export_environment_variables: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install DVC with GCS support
        run: pip install "dvc[gs]"

      - name: Pull model from tag model-v1 and place into model/artifacts
        shell: bash
        run: |
          set -euo pipefail

          ORIGINAL_SHA="$(git rev-parse HEAD)"
          TMP_DIR="$(mktemp -d)"

          echo "Original sha: ${ORIGINAL_SHA}"
          echo "Using temp dir: ${TMP_DIR}"

          git checkout model-v1
          dvc pull

          echo "Files after dvc pull on model-v1:"
          find . -maxdepth 3 -type f | sort

          mkdir -p "${TMP_DIR}/artifacts"

          if [ -f model.pt ]; then
            cp model.pt "${TMP_DIR}/artifacts/model.pt"
          elif [ -f model/artifacts/model.pt ]; then
            cp model/artifacts/model.pt "${TMP_DIR}/artifacts/model.pt"
          else
            echo "ERROR: model.pt not found after dvc pull"
            exit 1
          fi

          if [ -f model/recycling_info.json ]; then
            cp model/recycling_info.json "${TMP_DIR}/recycling_info.json"
          else
            echo "ERROR: model/recycling_info.json not found"
            exit 1
          fi

          git checkout "${ORIGINAL_SHA}"

          mkdir -p model/artifacts
          cp "${TMP_DIR}/artifacts/model.pt" model/artifacts/model.pt
          cp "${TMP_DIR}/recycling_info.json" model/recycling_info.json

          echo "Final files before docker compose build:"
          ls -lah model
          ls -lah model/artifacts

          test -f model/artifacts/model.pt
          test -f model/recycling_info.json

      - name: Login to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GAR_LOCATION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Set up Docker Compose
        uses: docker/setup-compose-action@v2

      - name: Build with Docker Compose
        run: docker compose build

      - name: Push with Docker Compose
        run: docker compose push
name: Build and Push Docker Images with Model

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GAR_LOCATION: ${{ vars.GAR_LOCATION }}
  GAR_REPOSITORY: recycling-ai
  MODEL_VERSION: model-v1

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token
          create_credentials_file: true
          export_environment_variables: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install DVC
        run: pip install "dvc[gs]"

      - name: Pull model from model version
        run: |
          set -e

          git checkout "${MODEL_VERSION}"
          dvc pull -v

          mkdir -p /tmp/artifacts

          if [ -f model.pt ]; then
            cp model.pt /tmp/artifacts/model.pt
          elif [ -f model/model.pt ]; then
            cp model/model.pt /tmp/artifacts/model.pt
          elif [ -f model/artifacts/model.pt ]; then
            cp model/artifacts/model.pt /tmp/artifacts/model.pt
          else
            echo "model.pt not found"
            exit 1
          fi

          if [ -f model/artifacts/labels.json ]; then
            cp model/artifacts/labels.json /tmp/artifacts/labels.json
          elif [ -f labels.json ]; then
            cp labels.json /tmp/artifacts/labels.json
          else
            echo "labels.json not found"
            exit 1
          fi

          git checkout "${GITHUB_SHA}"

          mkdir -p model/artifacts
          cp /tmp/artifacts/model.pt model/artifacts/model.pt
          cp /tmp/artifacts/labels.json model/artifacts/labels.json

          ls -lah model/artifacts

      - name: Login to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GAR_LOCATION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Set up Docker Compose
        uses: docker/setup-compose-action@v2

      - name: Build images
        run: docker compose -f docker-compose.prod.yml build --no-cache

      - name: Push images
        run: docker compose -f docker-compose.prod.yml build --no-cache
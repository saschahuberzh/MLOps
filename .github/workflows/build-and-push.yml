name: Build and Push to Artifact Registry with Compose (DEBUG)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GAR_LOCATION: ${{ vars.GAR_LOCATION }}
  GAR_REPOSITORY: ${{ vars.GAR_REPOSITORY }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install DVC
        run: pip install "dvc[gs]"

      # -----------------------------
      # DEBUG: DVC CONFIG
      # -----------------------------
      - name: Show DVC config
        run: |
          echo "=== DVC REMOTES ==="
          dvc remote list || true
          echo "=== .dvc/config ==="
          cat .dvc/config || true

      # -----------------------------
      # DEBUG: CHECKOUT TAG + DVC PULL
      # -----------------------------
      - name: Pull model from model-v1
        shell: bash
        run: |
          set -e

          echo "=== CURRENT COMMIT ==="
          git rev-parse HEAD

          echo "=== SWITCH TO TAG model-v1 ==="
          git checkout model-v1

          echo "=== FILES BEFORE DVC PULL ==="
          find . -maxdepth 3 -type f | sort

          echo "=== RUN DVC PULL ==="
          dvc pull -v

          echo "=== FILES AFTER DVC PULL ==="
          find . -maxdepth 4 -type f | sort

          echo "=== SEARCH MODEL ==="
          find . -name "model.pt" || echo "model.pt NOT FOUND"

          echo "=== SEARCH LABELS ==="
          find . -name "labels.json" || echo "labels.json NOT FOUND"

      # -----------------------------
      # DEBUG: COPY MODEL
      # -----------------------------
      - name: Copy model to correct path
        shell: bash
        run: |
          set -e

          echo "=== COPY PHASE ==="

          mkdir -p /tmp/artifacts

          if [ -f model.pt ]; then
            echo "FOUND model.pt in root"
            cp model.pt /tmp/artifacts/model.pt
          elif [ -f model/model.pt ]; then
            echo "FOUND model/model.pt"
            cp model/model.pt /tmp/artifacts/model.pt
          elif [ -f model/artifacts/model.pt ]; then
            echo "FOUND model/artifacts/model.pt"
            cp model/artifacts/model.pt /tmp/artifacts/model.pt
          else
            echo "ERROR: model.pt NOT FOUND ANYWHERE"
            exit 1
          fi

          if [ -f model/artifacts/labels.json ]; then
            cp model/artifacts/labels.json /tmp/artifacts/labels.json
          elif [ -f labels.json ]; then
            cp labels.json /tmp/artifacts/labels.json
          else
            echo "ERROR: labels.json NOT FOUND"
            exit 1
          fi

          echo "=== TEMP FILES ==="
          ls -lah /tmp/artifacts

      # -----------------------------
      # BACK TO MAIN
      # -----------------------------
      - name: Restore main branch
        run: |
          git checkout main

      # -----------------------------
      # PLACE FILES INTO BUILD CONTEXT
      # -----------------------------
      - name: Place model into repo
        run: |
          mkdir -p model/artifacts
          cp /tmp/artifacts/model.pt model/artifacts/model.pt
          cp /tmp/artifacts/labels.json model/artifacts/labels.json

          echo "=== FINAL FILES BEFORE BUILD ==="
          ls -lah model
          ls -lah model/artifacts

          test -f model/artifacts/model.pt
          test -f model/artifacts/labels.json

      # -----------------------------
      # DEBUG DOCKERIGNORE
      # -----------------------------
      - name: Show dockerignore
        run: |
          echo "=== .dockerignore ==="
          cat .dockerignore || echo "No .dockerignore"

      # -----------------------------
      # DOCKER LOGIN
      # -----------------------------
      - name: Login to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GAR_LOCATION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Set up Docker Compose
        uses: docker/setup-compose-action@v2

      # -----------------------------
      # BUILD
      # -----------------------------
      - name: Build images
        run: docker compose build --no-cache

      # -----------------------------
      # DEBUG IMAGE CONTENT
      # -----------------------------
      - name: Inspect container filesystem
        run: |
          docker compose run --rm --entrypoint sh backend -c '
            echo "=== /app ==="
            ls -lah /app

            echo "=== /app/model ==="
            ls -lah /app/model || true

            echo "=== /app/model/artifacts ==="
            ls -lah /app/model/artifacts || true

            echo "=== SEARCH MODEL ==="
            find /app -name "model.pt" || echo "model.pt NOT FOUND"

            echo "=== SEARCH LABELS ==="
            find /app -name "labels.json" || echo "labels.json NOT FOUND"
          '

      # -----------------------------
      # PUSH
      # -----------------------------
      - name: Push images
        run: docker compose push
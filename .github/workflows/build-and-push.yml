name: Build and Push to Artifact Registry with Compose

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GAR_LOCATION: ${{ vars.GAR_LOCATION }}
  GAR_REPOSITORY: ${{ vars.GAR_REPOSITORY }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository with full history and tags
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install DVC with GCS support
        run: pip install "dvc[gs]"

      - name: Pull model from tag model-v1
        shell: bash
        run: |
          set -euo pipefail

          ORIGINAL_REF="$(git rev-parse --abbrev-ref HEAD || true)"
          ORIGINAL_SHA="$(git rev-parse HEAD)"

          echo "Original ref: ${ORIGINAL_REF}"
          echo "Original sha: ${ORIGINAL_SHA}"

          git checkout model-v1

          dvc pull model/artifacts model/recycling_info.json

          test -d model/artifacts
          test -f model/recycling_info.json

          git checkout "${ORIGINAL_SHA}"

          echo "Verifying files after switching back"
          ls -lah model
          test -d model/artifacts
          test -f model/recycling_info.json

      - name: Login to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GAR_LOCATION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Set up Docker Compose
        uses: docker/setup-compose-action@v2

      - name: Build with Docker Compose
        run: docker compose build

      - name: Push with Docker Compose
        run: docker compose push
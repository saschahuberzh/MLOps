name: Build and Push to Artifact Registry with Compose

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GAR_LOCATION: ${{ vars.GAR_LOCATION }}
  GAR_REPOSITORY: ${{ vars.GAR_REPOSITORY }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository with full history and tags
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token
          create_credentials_file: true
          export_environment_variables: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install DVC with GCS support
        run: pip install "dvc[gs]"

      - name: Pull model from tag model-v1 and place real artifacts into model/artifacts
        shell: bash
        run: |
          set -euo pipefail

          ORIGINAL_SHA="$(git rev-parse HEAD)"
          TMP_DIR="$(mktemp -d)"

          echo "Original sha: ${ORIGINAL_SHA}"
          echo "Temp dir: ${TMP_DIR}"

          git checkout model-v1
          dvc pull

          echo "=== FILES ON model-v1 AFTER DVC PULL ==="
          find . -maxdepth 4 -type f | sort

          mkdir -p "${TMP_DIR}/artifacts"

          if [ -f model.pt ]; then
            cp model.pt "${TMP_DIR}/artifacts/model.pt"
          elif [ -f model/model.pt ]; then
            cp model/model.pt "${TMP_DIR}/artifacts/model.pt"
          elif [ -f model/artifacts/model.pt ]; then
            cp model/artifacts/model.pt "${TMP_DIR}/artifacts/model.pt"
          else
            echo "ERROR: echtes model.pt nicht gefunden"
            exit 1
          fi

          if [ -f model/artifacts/labels.json ]; then
            cp model/artifacts/labels.json "${TMP_DIR}/artifacts/labels.json"
          elif [ -f labels.json ]; then
            cp labels.json "${TMP_DIR}/artifacts/labels.json"
          else
            echo "ERROR: labels.json nicht gefunden"
            exit 1
          fi

          git checkout "${ORIGINAL_SHA}"

          mkdir -p model/artifacts
          cp "${TMP_DIR}/artifacts/model.pt" model/artifacts/model.pt
          cp "${TMP_DIR}/artifacts/labels.json" model/artifacts/labels.json

          echo "=== FINAL FILES BEFORE DOCKER BUILD ==="
          ls -lah model || true
          ls -lah model/artifacts || true

          test -f model/artifacts/model.pt
          test -f model/artifacts/labels.json

      - name: Show dockerignore
        run: |
          echo "=== .dockerignore ==="
          cat .dockerignore || echo "No .dockerignore found"

      - name: Login to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GAR_LOCATION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Set up Docker Compose
        uses: docker/setup-compose-action@v2

      - name: Build with Docker Compose
        run: docker compose build --no-cache backend frontend

      - name: Inspect backend image filesystem
        run: |
          docker compose run --rm --entrypoint sh backend -c '
            echo "=== /app ==="
            ls -lah /app || true
            echo "=== /app/model ==="
            ls -lah /app/model || true
            echo "=== /app/model/artifacts ==="
            ls -lah /app/model/artifacts || true
            echo "=== MODEL/LABEL SEARCH ==="
            find /app -name "model.pt" -o -name "labels.json" -o -name "*.dvc" | sort
            test -f /app/model/artifacts/model.pt
            test -f /app/model/artifacts/labels.json
          '

      - name: Push with Docker Compose
        run: docker compose push